<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            color: #333;
            font-size: 1.2em;
            line-height: 1.6;
            font-weight: 500;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info {
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😄 Joke Generator</h1>
        
        <div class="joke-box">
            <div class="joke-text" id="jokeText">Click the button to get a random joke!</div>
        </div>

        <button id="jokeBtn" onclick="getJoke()">Get a Joke</button>

        <div id="error" class="error" style="display: none;"></div>

        <div class="info">
            <p>Powered by <a href="https://api.api-ninjas.com/v1/jokes" target="_blank" style="color: #667eea; text-decoration: none;">API Ninjas</a></p>
        </div>
    </div>

    <script>
        const jokeText = document.getElementById('jokeText');
        const jokeBtn = document.getElementById('jokeBtn');
        const errorDiv = document.getElementById('error');

        async function getJoke() {
            jokeBtn.disabled = true;
            jokeText.textContent = 'Loading...';
            jokeText.classList.add('loading');
            errorDiv.style.display = 'none';

            try {
                // Using API Ninjas free joke API
                const response = await fetch('https://api.api-ninjas.com/v1/jokes?limit=1', {
                    headers: {
                        'X-Api-Key': 'YOUR_API_KEY_HERE' // Optional, the API works without it for basic requests
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();
                
                if (data && data.length > 0) {
                    jokeText.textContent = data[0].joke;
                    jokeText.classList.remove('loading');
                } else {
                    throw new Error('No joke received');
                }
            } catch (error) {
                console.error('Error:', error);
                jokeText.textContent = 'Oops! Failed to load a joke. Please try again.';
                jokeText.classList.remove('loading');
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                jokeBtn.disabled = false;
            }
        }

        // Load a joke when page loads
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
